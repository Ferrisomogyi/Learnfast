<html lang="nl">

<style>
:root {
  --bg: #08080a;
  --surface: #111114;
  --surface-hover: #18181c;
  --border: #1f1f25;
  --text: #e4e2de;
  --text-dim: #6b6b74;
  --accent: #e8b931;
  --accent-dim: rgba(232,185,49,0.12);
  --accent-33: rgba(232,185,49,0.2);
  --accent-55: rgba(232,185,49,0.33);
  --green: #4ade80;
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Instrument Sans', 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Screens */
.screen { display:none; }
.screen.active { display:flex; flex-direction:column; }

/* ── HOME ── */
#homeScreen { min-height:100vh; min-height:100dvh; }

.home-header {
  padding: 2.5rem 1.25rem 1rem;
  text-align: center;
}

.home-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
}

.home-sub {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 0.4rem;
}

.modes-list {
  padding: 1rem 1rem 3rem;
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.mode-btn {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 1rem 1.15rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  color: var(--text);
  width: 100%;
  font-family: inherit;
  font-size: inherit;
}

.mode-btn:active { transform: scale(0.985); }
.mode-btn:hover { background: var(--surface-hover); border-color: var(--accent-33); }

.mode-icon {
  font-size: 1.5rem;
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--accent-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.mode-info { flex:1; }
.mode-title { font-weight:600; font-size:0.95rem; }
.mode-desc { font-size:0.78rem; color:var(--text-dim); margin-top:2px; }

/* ── TOPICS ── */
#topicsScreen { min-height:100vh; min-height:100dvh; }

.top-bar {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.back-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; padding: 0.4rem; display: flex; align-items: center;
}

.top-bar-mode { font-size:0.8rem; color:var(--text-dim); }
.top-bar-title { font-weight:600; font-size:1rem; }

.topics-body {
  padding: 1rem 1rem 2rem;
  max-width: 600px;
  margin: 0 auto;
  overflow-y: auto;
  flex: 1;
}

.free-input-wrap {
  display: flex; gap: 0.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.5rem;
  margin-bottom: 1.25rem;
}

.free-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 0.9rem; padding: 0.5rem 0.75rem;
  font-family: inherit;
}

.free-input::placeholder { color: var(--text-dim); }

.start-btn {
  padding: 0.6rem 1.1rem;
  background: var(--border);
  color: var(--text-dim);
  border: none; border-radius: 8px;
  font-weight: 600; font-size: 0.8rem;
  cursor: default; font-family: inherit;
  transition: all 0.2s;
}

.start-btn.ready {
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
}

.cat-list { display:flex; flex-direction:column; gap:0.4rem; }

.cat-header {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  color: var(--text);
  font-size: 0.9rem;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.2s;
}

.cat-header.open {
  background: var(--surface-hover);
  border-color: var(--accent-33);
  border-radius: 12px 12px 0 0;
}

.cat-header svg {
  transition: transform 0.2s;
}

.cat-header.open svg {
  transform: rotate(180deg);
}

.cat-topics {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 0.5rem;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.cat-topics.open { display: flex; }

.topic-chip {
  padding: 0.5rem 0.85rem;
  background: var(--accent-dim);
  border: 1px solid transparent;
  border-radius: 8px;
  color: var(--text);
  font-size: 0.78rem;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.topic-chip:hover {
  border-color: var(--accent-55);
  background: var(--accent-33);
}

.topic-chip:active { transform: scale(0.96); }

/* ── CHAT ── */
#chatScreen {
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
}

.chat-header {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.chat-header-info { flex:1; min-width:0; }
.chat-header-mode {
  font-size: 0.85rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-header-topic {
  font-size: 0.72rem; color: var(--accent);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.new-topic-btn {
  padding: 0.4rem 0.8rem;
  background: var(--accent-dim);
  border: none; border-radius: 8px;
  color: var(--accent);
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  -webkit-overflow-scrolling: touch;
}

.msg {
  max-width: 88%;
}

.msg.user { align-self: flex-end; }
.msg.assistant { align-self: flex-start; }

.msg-bubble {
  padding: 0.85rem 1rem;
  border-radius: 14px 14px 14px 4px;
  font-size: 0.85rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--surface);
  border: 1px solid var(--border);
}

.msg.user .msg-bubble {
  background: var(--accent-dim);
  border-color: var(--accent-33);
  border-radius: 14px 14px 4px 14px;
}

.msg-thinking {
  animation: pulse 1.5s infinite;
  color: var(--text-dim);
}

@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.chat-input-bar {
  padding: 0.75rem 1rem;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.chat-input-wrap {
  display: flex; gap: 0.5rem;
  max-width: 600px; margin: 0 auto;
}

.chat-input {
  flex: 1;
  padding: 0.7rem 1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.88rem;
  outline: none;
  font-family: inherit;
}

.chat-input:disabled { opacity: 0.5; }
.chat-input::placeholder { color: var(--text-dim); }

.send-btn {
  padding: 0.7rem 1rem;
  background: var(--border);
  color: var(--text-dim);
  border: none; border-radius: 10px;
  cursor: default;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.send-btn.ready {
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
}

/* Install banner */
.install-banner {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 1rem 1.25rem;
  display: none;
  align-items: center;
  gap: 0.75rem;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.install-banner.show { display: flex; }
.install-banner p { flex:1; font-size:0.8rem; color:var(--text-dim); }
.install-banner .install-btn {
  padding: 0.6rem 1.2rem; background: var(--accent); color: var(--bg);
  border: none; border-radius: 10px; font-family: inherit;
  font-weight: 700; font-size: 0.8rem; cursor: pointer;
}
.install-banner .close-install {
  background: none; color: var(--text-dim); border: none;
  padding: 0.4rem; font-size: 1.2rem; line-height: 1; cursor: pointer;
}

/* Markdown-ish rendering */
.msg-bubble strong, .msg-bubble b { font-weight: 700; color: var(--accent); }
.msg-bubble em, .msg-bubble i { font-style: italic; }
</style>
</head>

  return localStorage.getItem('learnfast_api_key') || '';

}

  const key = prompt('Voer je Anthropic API key in (begint met sk-ant-...):\n\nDeze wordt alleen lokaal op je telefoon opgeslagen.');

let currentMode = null;

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id + 'Screen').classList.add('active');
}

// ── HOME: Render modes ──
function renderModes() {
  const list = document.getElementById('modesList');
  list.innerHTML = MODES.map(m => `
    <button class="mode-btn" onclick="selectMode('${m.id}')">
      <div class="mode-icon">${m.icon}</div>
      <div class="mode-info">
        <div class="mode-title">${m.title}</div>
        <div class="mode-desc">${m.desc}</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b6b74" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  `).join('');
}

function selectMode(id) {
  currentMode = MODES.find(m => m.id === id);
  expandedCat = null;
  document.getElementById('topBarMode').textContent = currentMode.icon + ' ' + currentMode.title;
  document.getElementById('freeInput').value = '';
  updateFreeBtn();
  renderCategories();
  showScreen('topics');
  document.getElementById('freeInput').focus();
}

// ── TOPICS ──
function renderCategories() {
  const list = document.getElementById('catList');
  list.innerHTML = Object.entries(TOPICS).map(([cat, topics], ci) => `
    <div>
      <button class="cat-header ${expandedCat===cat?'open':''}" onclick="toggleCat('${cat.replace(/'/g,"\\'")}')">
        <span>${cat}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b6b74" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="cat-topics ${expandedCat===cat?'open':''}">
        ${topics.map(t => `<button class="topic-chip" onclick="startChat('${t.replace(/'/g,"\\'")}')">${t}</button>`).join('')}
      </div>
    </div>
  `).join('');
}

function toggleCat(cat) {
  expandedCat = expandedCat === cat ? null : cat;
  renderCategories();
}

const freeInput = document.getElementById('freeInput');
const freeStartBtn = document.getElementById('freeStartBtn');

freeInput.addEventListener('input', updateFreeBtn);
freeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && freeInput.value.trim()) startFromFreeInput();
});

function updateFreeBtn() {
  const has = freeInput.value.trim().length > 0;
  freeStartBtn.classList.toggle('ready', has);
}

function startFromFreeInput() {
  const val = freeInput.value.trim();
  if (val) startChat(val);
}

// ── CHAT ──
async function startChat(topic) {
  currentTopic = topic;
  chatHistory = [];
  document.getElementById('chatMode').textContent = currentMode.icon + ' ' + currentMode.title;
  document.getElementById('chatTopic').textContent = topic;
  document.getElementById('chatInput').placeholder = currentMode.inputPlaceholder || "Typ een bericht...";
  document.getElementById('messages').innerHTML = '';
  showScreen('chat');

  const userMsg = currentMode.starter(topic);
  chatHistory.push({ role: "user", content: userMsg });

  await callAPI();
}

async function callAPI() {
  let apiKey = getApiKey();
  if (!apiKey) {
    apiKey = promptApiKey();
    if (!apiKey) {
      addMessage("assistant", "Je hebt een Anthropic API key nodig om LearnFast te gebruiken. Ga naar console.anthropic.com om er een aan te maken.");
      return;
    }
  }

  isLoading = true;
  updateSendBtn();
  addThinking();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        system: currentMode.system,
        messages: chatHistory,
      }),
    });

    const data = await res.json();

    // Check for auth errors
    if (res.status === 401 || data.error?.type === 'authentication_error') {
      removeThinking();
      localStorage.removeItem('learnfast_api_key');
      addMessage("assistant", "API key is ongeldig. Probeer opnieuw met een geldige key.");
      isLoading = false;
      updateSendBtn();
      return;
    }

    const text = data.content?.map(b => b.text || "").join("") || "Er ging iets mis. Probeer opnieuw.";

    removeThinking();
    chatHistory.push({ role: "assistant", content: text });
    addMessage("assistant", text);
  } catch (e) {
    removeThinking();
    const errMsg = "Verbindingsfout. Controleer je internet en probeer opnieuw.";
    chatHistory.push({ role: "assistant", content: errMsg });
    addMessage("assistant", errMsg);
  }

  isLoading = false;
  updateSendBtn();
  document.getElementById('chatInput').focus();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  addMessage("user", text);
  chatHistory.push({ role: "user", content: text });

  await callAPI();
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(role, content) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  // Basic markdown rendering
  let html = escapeHtml(content)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:0.8em;">$1</code>');

  div.innerHTML = `<div class="msg-bubble">${html}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addThinking() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'thinkingMsg';
  div.innerHTML = '<div class="msg-bubble"><span class="msg-thinking">Aan het denken...</span></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinkingMsg');
  if (el) el.remove();
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  const input = document.getElementById('chatInput');
  const ready = input.value.trim().length > 0 && !isLoading;
  btn.classList.toggle('ready', ready);
  input.disabled = isLoading;
}

document.getElementById('chatInput').addEventListener('input', updateSendBtn);

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function backToHome() {
  chatHistory = [];
  showScreen('home');
}

function newTopic() {
  chatHistory = [];
  document.getElementById('freeInput').value = '';
  updateFreeBtn();
  expandedCat = null;
  renderCategories();
  showScreen('topics');
}

// ── PWA INSTALL ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    });
  }
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── API KEY SETTINGS ──
function changeApiKey() {
  const current = getApiKey();
  const masked = current ? '••••' + current.slice(-6) : 'niet ingesteld';
  const key = prompt(`Huidige key: ${masked}\n\nVoer een nieuwe Anthropic API key in (begint met sk-ant-...):\n\nLaat leeg om huidige te behouden.`);
  if (key && key.trim().startsWith('sk-')) {
    setApiKey(key.trim());
    alert('API key opgeslagen!');
  } else if (key !== null && key !== '') {
    alert('Ongeldige key. Moet beginnen met sk-ant-...');
  }
}

// ── INIT ──
renderModes();
</script>
